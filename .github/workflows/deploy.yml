name: Deploy production

on:
  push:
    branches:
      - main

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  MONGO_VERSION: "8.2"
  MONGO_INITDB_DATABASE: bonbonk
  MARIADB_VERSION: "11.8"
  REDIS_VERSION: "8.6"
  KAFKA_VERSION: "4.3.0"

jobs:
  build:
    name: Build and push Docker images
    runs-on: ubuntu-latest

    outputs:
      image_repository: ${{ steps.vars.outputs.image_repository }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare image variables
        id: vars
        run: |
          IMAGE_REPOSITORY="$(echo "${REGISTRY}/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate compose file
        run: |
          IMAGE_REPOSITORY=local/bonbonk \
          IMAGE_TAG=ci \
          MONGO_VERSION="${MONGO_VERSION}" \
          MONGO_INITDB_DATABASE="${MONGO_INITDB_DATABASE}" \
          MONGO_INITDB_ROOT_USERNAME=ci_user \
          MONGO_INITDB_ROOT_PASSWORD=ci_password \
          MARIADB_VERSION="${MARIADB_VERSION}" \
          MARIADB_DATABASE=ci_database \
          MARIADB_USER=ci_user \
          MARIADB_ROOT_PASSWORD=ci_root_password \
          MARIADB_PASSWORD=ci_password \
          REDIS_VERSION="${REDIS_VERSION}" \
          REDIS_PASSWORD=ci_password \
          docker compose config --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/nginx/Dockerfile
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          tags: |
            ${{ steps.vars.outputs.image_repository }}-web:${{ github.sha }}
            ${{ steps.vars.outputs.image_repository }}-web:main

      - name: Build and push PHP image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          cache-from: type=gha,scope=php
          cache-to: type=gha,mode=max,scope=php
          tags: |
            ${{ steps.vars.outputs.image_repository }}-php:${{ github.sha }}
            ${{ steps.vars.outputs.image_repository }}-php:main

      - name: Build and push Node image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/node/Dockerfile
          push: true
          cache-from: type=gha,scope=node
          cache-to: type=gha,mode=max,scope=node
          tags: |
            ${{ steps.vars.outputs.image_repository }}-node:${{ github.sha }}
            ${{ steps.vars.outputs.image_repository }}-node:main

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          IMAGE_REPOSITORY: ${{ needs.build.outputs.image_repository }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}

          MONGO_VERSION: ${{ env.MONGO_VERSION }}
          MONGO_INITDB_DATABASE: ${{ env.MONGO_INITDB_DATABASE }}
          MONGO_INITDB_ROOT_USERNAME: ${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
          MONGO_INITDB_ROOT_PASSWORD: ${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}

          MARIADB_VERSION: ${{ env.MARIADB_VERSION }}
          MARIADB_DATABASE: ${{ secrets.MARIADB_DATABASE }}
          MARIADB_USER: ${{ secrets.MARIADB_USER }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_PASSWORD: ${{ secrets.MARIADB_PASSWORD }}

          REDIS_VERSION: ${{ env.REDIS_VERSION }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

          KAFKA_VERSION: ${{ env.KAFKA_VERSION }}
        run: |
          set -euo pipefail

          : "${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME secret is required}"
          : "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD secret is required}"

          : "${MARIADB_DATABASE:?MARIADB_DATABASE secret is required}"
          : "${MARIADB_USER:?MARIADB_USER secret is required}"
          : "${MARIADB_ROOT_PASSWORD:?MARIADB_ROOT_PASSWORD secret is required}"
          : "${MARIADB_PASSWORD:?MARIADB_PASSWORD secret is required}"

          : "${REDIS_PASSWORD:?REDIS_PASSWORD secret is required}"

          PORT="${VPS_PORT:-22}"

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "$PORT" -H "$VPS_HOST" >> ~/.ssh/known_hosts

          ssh -p "$PORT" -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" 'bash -s' <<EOF
          set -euo pipefail

          APP_DIR="/home/nukie88deploy/apps/bonbonk"
          REPO_URL="https://github.com/ngBulgaria/bonbonk.git"
          BRANCH="main"

          echo "Starting BonBonK deployment..."

          if ! command -v git >/dev/null 2>&1; then
            echo "ERROR: git is not installed on VPS"
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "ERROR: docker is not installed on VPS"
            exit 1
          fi

          if ! docker compose version >/dev/null 2>&1; then
            echo "ERROR: docker compose v2 is not available on VPS"
            exit 1
          fi

          mkdir -p "\$(dirname "\$APP_DIR")"

          if [ ! -d "\$APP_DIR/.git" ]; then
            echo "Cloning repository..."
            git clone --branch "\$BRANCH" "\$REPO_URL" "\$APP_DIR"
          fi

          cd "\$APP_DIR"

          echo "Pulling latest code from main..."
          git fetch origin "\$BRANCH"
          git reset --hard "origin/\$BRANCH"

          if [ ! -f compose.yaml ] && [ ! -f docker-compose.yml ]; then
            echo "ERROR: No compose.yaml or docker-compose.yml found."
            exit 1
          fi

          cat > .env.production <<ENVFILE
          IMAGE_REPOSITORY=${IMAGE_REPOSITORY}
          IMAGE_TAG=${IMAGE_TAG}

          MONGO_VERSION=${MONGO_VERSION}
          MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
          MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
          MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}

          MARIADB_VERSION=${MARIADB_VERSION}
          MARIADB_DATABASE=${MARIADB_DATABASE}
          MARIADB_USER=${MARIADB_USER}
          MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
          MARIADB_PASSWORD=${MARIADB_PASSWORD}

          REDIS_VERSION=${REDIS_VERSION}
          REDIS_PASSWORD=${REDIS_PASSWORD}
          ENVFILE

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          echo "Pulling prebuilt images..."
          docker compose --env-file .env.production pull

          echo "Starting containers without building on VPS..."
          docker compose --env-file .env.production up -d --no-build --remove-orphans

          echo "Cleaning unused Docker images..."
          docker image prune -f

          echo "BonBonK deployment finished successfully."
          EOF