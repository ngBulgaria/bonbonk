services:
  web:
    image: nginx:1.27-alpine
    container_name: bonbonk-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - /etc/ssl/cloudflare/bonbonk:/etc/nginx/certs:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: bonbonk-php
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./public:/var/www/html:ro

  node:
    build:
      context: .
      dockerfile: node/Dockerfile
    container_name: bonbonk-node
    working_dir: /app
    volumes:
      - ./:/app
    profiles:
      - tools
    command: ["npm", "--version"]