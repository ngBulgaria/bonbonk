services:
  web:
    image: nginx:1.27-alpine
    container_name: bonbonk-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/usr/share/nginx/html:ro
      - /etc/ssl/cloudflare/bonbonk:/etc/nginx/certs:ro